services:
  dotnet-sdk:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /workspace
    volumes:
      - .:/workspace
      - dotnet-nuget-cache:/root/.nuget/packages
    depends_on:
      ledger-postgres:
        condition: service_healthy

  ledger-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  dotnet-nuget-cache:
